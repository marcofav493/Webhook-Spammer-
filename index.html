<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarcoXz Webhook Spammer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        body {
            background: #0c0f0c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 820px;
            width: 100%;
            background: #111811;
            border: 2px solid #1f3b1f;
            border-radius: 18px;
            padding: 28px 26px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.08);
        }

        /* HEADER */
        .header {
            border-bottom: 2px dashed #1f3b1f;
            padding-bottom: 14px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-left .icon {
            font-size: 28px;
            color: #33ff33;
            text-shadow: 0 0 10px #33ff33;
        }

        .header-left h1 {
            font-size: 22px;
            font-weight: 700;
            color: #33ff33;
            text-shadow: 0 0 6px #1a7a1a;
            letter-spacing: 1px;
        }

        .header-left .sub {
            font-size: 11px;
            color: #3a7a3a;
            letter-spacing: 1px;
        }

        /* TABS */
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 26px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: #0f170f;
            border: 1px solid #1f3b1f;
            color: #3a7a3a;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.25s;
        }

        .tab-btn:hover {
            background: #1a2e1a;
            color: #88ff88;
        }

        .tab-btn.active {
            background: #1f3b1f;
            border-color: #33ff33;
            color: #33ff33;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.12);
        }

        /* CARD */
        .card {
            background: #0d130d;
            border-radius: 16px;
            padding: 22px 24px;
            border: 1px solid #1f3b1f;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #33ff33;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 4px #0f3f0f;
        }

        .card-title .badge {
            font-size: 10px;
            background: #1a2e1a;
            padding: 2px 14px;
            border-radius: 30px;
            color: #4a9a4a;
            border: 1px solid #1f3b1f;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #3a8a3a;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: #0a110a;
            border: 1px solid #1a2e1a;
            border-radius: 10px;
            color: #bbffbb;
            font-size: 14px;
            outline: none;
            transition: 0.25s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #33ff33;
            box-shadow: 0 0 18px rgba(0, 255, 0, 0.06);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #2a4a2a;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* BUTTON */
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: #1a3b1a;
            color: #33ff33;
            border: 1px solid #33ff33;
        }

        .btn-primary:hover {
            background: #33ff33;
            color: #0a110a;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.15);
        }

        .btn-danger {
            background: #2a1a1a;
            color: #ff5555;
            border: 1px solid #5a2a2a;
        }

        .btn-danger:hover {
            background: #5a1a1a;
            border-color: #ff5555;
            box-shadow: 0 0 25px rgba(255, 50, 50, 0.12);
        }

        .btn-success {
            background: #1a2a1a;
            color: #55ff88;
            border: 1px solid #2a5a3a;
        }

        .btn-success:hover {
            background: #2a5a3a;
            border-color: #55ff88;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #1f3b1f;
            color: #3a7a3a;
        }

        .btn-outline:hover {
            background: #1a2e1a;
            border-color: #4a9a4a;
            color: #88ff88;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        /* FILE UPLOAD */
        .file-upload {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #0a110a;
            padding: 10px 16px;
            border-radius: 40px;
            border: 1px solid #1a2e1a;
        }

        .file-upload span {
            color: #2a5a2a;
            font-size: 13px;
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .file-upload label {
            background: #1a2e1a;
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 12px;
            color: #4a9a4a;
            transition: 0.25s;
            border: 1px solid #1f3b1f;
        }

        .file-upload label:hover {
            background: #2a4a2a;
            color: #88ff88;
        }

        /* LOGS */
        .logs {
            background: #080f08;
            border-radius: 12px;
            padding: 14px 16px;
            max-height: 150px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #3a8a3a;
            border: 1px solid #1a2e1a;
            margin-top: 16px;
            line-height: 1.6;
        }

        .logs .log-success { color: #55ff88; }
        .logs .log-error { color: #ff6666; }
        .logs .log-info { color: #55bbff; }

        /* FOOTER */
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #1a3a1a;
            letter-spacing: 1px;
            border-top: 1px dashed #1a2e1a;
            padding-top: 16px;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .tabs {
                flex-direction: column;
            }
            .tab-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <span class="icon">⚡</span>
            <div>
                <h1>PMSW - MarcoXz</h1>
                <span class="sub">// PERSATUAN MUWANI SPAMMER WEBHOOK</span>
            </div>
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="spammer" onclick="switchTab('spammer')">Webhook Spammer</button>
        <button class="tab-btn" data-tab="deleter" onclick="switchTab('deleter')">Webhook Deleter</button>
        <button class="tab-btn" data-tab="tester" onclick="switchTab('tester')">Webhook Tester</button>
    </div>

    <!-- TAB 1: SPAMMER -->
    <div id="tab-spammer" class="tab-content">
        <div class="card">
            <div class="card-title">
                📨 Webhook Spammer
                <span class="badge">MULTI-THREAD</span>
            </div>

            <div class="form-group">
                <label>URL Webhook Discord</label>
                <input type="url" id="spamUrl" placeholder="https://discord.com/api/webhooks/..." value="https://discord.com/api/webhooks/">
            </div>

            <div class="form-group">
                <label>Pesan yang akan dikirim</label>
                <textarea id="spamMessage" rows="2" placeholder="Halo, ini pesan spam...">@everyone SERVER KENA SPAM KONTOL!</textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Jumlah Spam (maks 50)</label>
                    <input type="number" id="spamCount" value="5" min="1" max="50">
                </div>
                <div class="form-group">
                    <label>Delay antar kirim (ms)</label>
                    <input type="number" id="spamDelay" value="500" min="50" max="5000">
                </div>
            </div>

            <div class="form-group">
                <label>Upload Gambar (opsional)</label>
                <div class="file-upload">
                    <input type="file" id="spamImage" accept="image/*">
                    <label for="spamImage">Pilih File</label>
                    <span id="spamImageName">Tidak ada file yang dipilih</span>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="startSpam()">🚀 Mulai Spam</button>
                <button class="btn btn-outline" onclick="stopSpam()">⏹ Stop</button>
                <button class="btn btn-outline" onclick="clearLogs()">🗑 Clear Logs</button>
            </div>

            <div class="logs" id="spamLogs">
                <div class="log-info">[✓] Webhook Spammer siap digunakan.</div>
            </div>
        </div>
    </div>

    <!-- TAB 2: DELETER -->
    <div id="tab-deleter" class="tab-content" style="display:none;">
        <div class="card">
            <div class="card-title">🗑 Webhook Deleter</div>

            <div class="form-group">
                <label>URL Webhook Discord</label>
                <input type="url" id="deleteUrl" placeholder="https://discord.com/api/webhooks/..." value="https://discord.com/api/webhooks/">
            </div>

            <div class="btn-group">
                <button class="btn btn-danger" onclick="deleteWebhook()">💀 Hapus Webhook</button>
                <button class="btn btn-outline" onclick="clearLogs()">🗑 Clear Logs</button>
            </div>

            <div class="logs" id="deleteLogs">
                <div class="log-info">[✓] Webhook Deleter siap digunakan.</div>
            </div>
        </div>
    </div>

    <!-- TAB 3: TESTER -->
    <div id="tab-tester" class="tab-content" style="display:none;">
        <div class="card">
            <div class="card-title">🔍 Webhook Tester</div>

            <div class="form-group">
                <label>URL Webhook Discord</label>
                <input type="url" id="testUrl" placeholder="https://discord.com/api/webhooks/..." value="https://discord.com/api/webhooks/">
            </div>

            <div class="btn-group">
                <button class="btn btn-success" onclick="testWebhook()">🔍 Test Webhook</button>
                <button class="btn btn-outline" onclick="clearLogs()">🗑 Clear Logs</button>
            </div>

            <div class="logs" id="testLogs">
                <div class="log-info">[✓] Webhook Tester siap digunakan.</div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">MarcoXz Webhook Tools // encrypted · 0x3F2A</div>
</div>

<script>
    // ========== TAB ==========
    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
        document.getElementById('tab-' + tab).style.display = 'block';
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
    }

    // ========== LOG ==========
    function addLog(id, msg, type = 'info') {
        const log = document.getElementById(id);
        const div = document.createElement('div');
        div.className = 'log-' + type;
        div.textContent = msg;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    function clearLogs() {
        document.querySelectorAll('.logs').forEach(el => {
            el.innerHTML = '<div class="log-info">[✓] Logs dibersihkan.</div>';
        });
    }

    // ========== SPAMMER ==========
    let spamRunning = false;

    async function startSpam() {
        const url = document.getElementById('spamUrl').value.trim();
        const msg = document.getElementById('spamMessage').value.trim();
        let count = parseInt(document.getElementById('spamCount').value) || 5;
        const delay = parseInt(document.getElementById('spamDelay').value) || 500;

        if (!url || !url.startsWith('https://discord.com/api/webhooks/')) {
            addLog('spamLogs', '[✗] URL Webhook tidak valid!', 'error');
            return;
        }
        if (!msg) {
            addLog('spamLogs', '[✗] Pesan tidak boleh kosong!', 'error');
            return;
        }

        // Batasi maksimal 50
        if (count > 50) {
            count = 50;
            document.getElementById('spamCount').value = 50;
            addLog('spamLogs', '[!] Jumlah spam dibatasi maksimal 50', 'info');
        }

        spamRunning = true;
        addLog('spamLogs', '[🚀] Spam dimulai... ' + count + 'x', 'info');

        let sent = 0;
        for (let i = 0; i < count && spamRunning; i++) {
            try {
                const payload = { content: msg };
                const img = document.getElementById('spamImage');
                if (img.files && img.files.length > 0) {
                    const reader = new FileReader();
                    const base64 = await new Promise(resolve => {
                        reader.onload = e => resolve(e.target.result.split(',')[1]);
                        reader.readAsDataURL(img.files[0]);
                    });
                    payload.embeds = [{ image: { url: 'data:image/png;base64,' + base64 } }];
                }

                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.status === 204) {
                    sent++;
                    addLog('spamLogs', '[✓] Pesan ke-' + sent + ' terkirim', 'success');
                } else if (res.status === 429) {
                    addLog('spamLogs', '[!] Rate limit! Menunggu 5s...', 'info');
                    await new Promise(r => setTimeout(r, 5000));
                } else {
                    addLog('spamLogs', '[✗] Gagal: ' + res.status, 'error');
                }
                await new Promise(r => setTimeout(r, delay));
            } catch (e) {
                addLog('spamLogs', '[✗] Error: ' + e.message, 'error');
            }
        }
        if (spamRunning) addLog('spamLogs', '[✓] Selesai! Total: ' + sent, 'success');
        spamRunning = false;
    }

    function stopSpam() {
        spamRunning = false;
        addLog('spamLogs', '[⏹] Spam dihentikan.', 'info');
    }

    // ========== DELETER ==========
    async function deleteWebhook() {
        const url = document.getElementById('deleteUrl').value.trim();
        if (!url || !url.startsWith('https://discord.com/api/webhooks/')) {
            addLog('deleteLogs', '[✗] URL tidak valid!', 'error');
            return;
        }
        try {
            addLog('deleteLogs', '[⏳] Menghapus...', 'info');
            const res = await fetch(url, { method: 'DELETE' });
            if (res.status === 204) {
                addLog('deleteLogs', '[✓] Webhook berhasil dihapus!', 'success');
            } else {
                addLog('deleteLogs', '[✗] Gagal: ' + res.status, 'error');
            }
        } catch (e) {
            addLog('deleteLogs', '[✗] Error: ' + e.message, 'error');
        }
    }

    // ========== TESTER ==========
    async function testWebhook() {
        const url = document.getElementById('testUrl').value.trim();
        if (!url || !url.startsWith('https://discord.com/api/webhooks/')) {
            addLog('testLogs', '[✗] URL tidak valid!', 'error');
            return;
        }
        try {
            addLog('testLogs', '[⏳] Testing...', 'info');
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: '✅ Webhook aktif!' })
            });
            if (res.status === 204) {
                addLog('testLogs', '[✓] Webhook AKTIF!', 'success');
            } else {
                addLog('testLogs', '[✗] ERROR: ' + res.status, 'error');
            }
        } catch (e) {
            addLog('testLogs', '[✗] Error: ' + e.message, 'error');
        }
    }

    // ========== FILE UPLOAD ==========
    document.getElementById('spamImage').addEventListener('change', function() {
        document.getElementById('spamImageName').textContent =
            this.files[0] ? this.files[0].name : 'Tidak ada file yang dipilih';
    });
</script>

</body>
</html>
